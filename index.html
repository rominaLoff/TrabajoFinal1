<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <div class="contenedor-marca-btn">
            <div class = "marca">La Nueva Tiendita <button id="btn-dark-mode">🌙</button></div>
            
        </div>
            

        <div id ="Carrito-compras">
            <span id="contador-carrito"> 🛒 Carrito (0) </span>
            <button id="btn-ver-carrito" class="btn-encabezado-carrito">Ver Carrito</button>        
        </div>
    </header>
    <main class="contenedor-principal">                                                       
        <aside class="columna-filtro">
            
            <div class="caja-categoria">
             <span>Categorías</span>
            </div>
            <select id="filtroCategorias">
                <option value="todos">Todos los productos</option>
                
            </select>

        </aside>
        <section id="contenedor-productos" class="columna-productos">
            <p>Cargando productos... </p>
        </section>
    </main>

    <div id="modal-producto" class="modal">
        <div class="modal-contenido">
            <span class="cerrar-modal" class="cerrar">&times;</span>
            <div id="detalle-producto-modal">
            </div> 
        </div>
    </div>
    <div id="modal-carrito" class="modal">
        <div class="modal-contenido-carrito">
            <span class="cerrar-modal" id= "cerrar-carrito-btn">&times;</span>
            <h2>Tu Carrito de Compras</h2>

            <div id="items-carrito-contenedor">
            </div> 
            <div class="resumen-carrito">
                <p>Cantidad de productos: <span id="total-cantidad">0</span></p>
                <p><strong>Total a pagar: $<span id="total-precio">0.00</span></strong></p>
            </div>

            <button class="btn-vaciar" id="btn-vaciar-carrito">Vaciar Carrito</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
